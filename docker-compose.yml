services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_data:/data
    environment:
      DATABASE_NAME: /data/attendance.db
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-only-secret-key-change-me}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      SESSION_LIFETIME_DAYS: ${SESSION_LIFETIME_DAYS:-7}
      MAX_CONTENT_LENGTH_MB: ${MAX_CONTENT_LENGTH_MB:-5}
      MAX_PROOF_BASE64_CHARS: ${MAX_PROOF_BASE64_CHARS:-5000000}
      FLASK_APP: app.py
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_DEBUG: "1"
    command: sh -c "python database.py && flask run --host=0.0.0.0 --port=5000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:5000}
      NEXT_PUBLIC_ALLOW_SIGNUP: ${NEXT_PUBLIC_ALLOW_SIGNUP:-true}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev:docker -- --hostname 0.0.0.0 --port 3000"

volumes:
  frontend_node_modules:
  backend_data:
